<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>BMI Calculator</title>
    <link rel="stylesheet" href="BMI.css">
</head>
<body>
    <h1>BMI Calculator</h1>
    <form class="conatiner">
        <label for="">Height in Cm:</label>
        <input type="text" placeholder="Enter your height in cm" id="input1">

        <label for="">Weight in KG:</label>
        <input type="text" placeholder="Enter your weight in kg" id="input2">

        <button id="button" type="submit">Calculate</button>
        <div class="output">
            <!-- <p>Value</p> -->
        </div>

        <div id="weight-guide">
            <h3>BMI Weight Guide</h3>
            <p>Under Weight = Less than 18.6</p>
            <p>Normal Weight = Between 18.6 and 24.9</p>
            <p>OverWeight = Greater than 24.9</p>
        </div>
    </form>

    <script src="BMI.js"></script>
</body>
</html>
